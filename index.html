<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c1221;
    --card: rgba(22, 33, 56, 0.75);
    --card-border: rgba(56, 189, 248, 0.08);
    --surface: rgba(30, 44, 70, 0.6);
    --surface-hover: rgba(40, 58, 90, 0.7);
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent-work: #38bdf8;
    --accent-break: #a78bfa;
    --ring-track: rgba(51, 65, 85, 0.5);
    --glow-work: rgba(56, 189, 248, 0.15);
    --glow-break: rgba(167, 139, 250, 0.15);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    overflow: hidden;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    width: 600px; height: 600px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: var(--glow-work);
    filter: blur(120px);
    transition: background 0.8s ease;
    pointer-events: none;
    z-index: 0;
  }
  body.break-mode::before { background: var(--glow-break); }

  .card {
    position: relative;
    z-index: 1;
    background: var(--card);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid var(--card-border);
    border-radius: 28px;
    padding: 44px 40px 36px;
    width: 380px;
    max-width: 92vw;
    text-align: center;
    box-shadow:
      0 4px 24px rgba(0,0,0,0.25),
      0 20px 60px rgba(0,0,0,0.2),
      inset 0 1px 0 rgba(255,255,255,0.04);
    transition: box-shadow 0.6s ease;
  }

  /* Length toggle */
  .length-toggle {
    display: inline-flex;
    gap: 4px;
    padding: 4px;
    margin-bottom: 18px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
  }
  .length-btn {
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 18px;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .length-btn.active {
    background: var(--accent-work);
    color: #0c1221;
  }
  body.break-mode .length-btn.active { background: var(--accent-break); }
  .length-toggle.locked { opacity: 0.4; pointer-events: none; }

  /* Session label */
  .session-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--accent-work);
    margin-bottom: 32px;
    transition: color 0.6s ease;
  }
  body.break-mode .session-label { color: var(--accent-break); }

  /* Timer ring container */
  .timer-ring {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 0 auto 32px;
  }

  .timer-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .timer-ring .track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 6;
  }

  .timer-ring .progress {
    fill: none;
    stroke: var(--accent-work);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.6s ease;
    filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.3));
  }
  body.break-mode .timer-ring .progress {
    stroke: var(--accent-break);
    filter: drop-shadow(0 0 6px rgba(167, 139, 250, 0.3));
  }

  /* Timer digits overlay */
  .timer-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .timer-digits {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: var(--text);
  }

  .timer-fraction {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .timer-fraction.visible { opacity: 1; }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .btn {
    border: none;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    outline: none;
  }

  .btn-primary {
    padding: 14px 36px;
    background: var(--accent-work);
    color: #0c1221;
    box-shadow: 0 2px 12px rgba(56, 189, 248, 0.25);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(56, 189, 248, 0.35);
  }
  .btn-primary:active { transform: translateY(0); }

  body.break-mode .btn-primary {
    background: var(--accent-break);
    box-shadow: 0 2px 12px rgba(167, 139, 250, 0.25);
  }
  body.break-mode .btn-primary:hover {
    box-shadow: 0 4px 20px rgba(167, 139, 250, 0.35);
  }

  .btn-secondary {
    padding: 14px 20px;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.04);
  }
  .btn-secondary:hover {
    background: var(--surface-hover);
    color: var(--text);
  }

  /* Task input */
  .task-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease;
    margin-bottom: 24px;
  }
  .task-input::placeholder { color: var(--text-muted); opacity: 0.6; }
  .task-input:focus {
    border-color: rgba(56, 189, 248, 0.2);
    background: rgba(30, 44, 70, 0.8);
  }

  /* Stats row */
  .stats {
    display: flex;
    justify-content: center;
    gap: 32px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .stats-toggle {
    margin: 18px auto 0;
    display: block;
    background: transparent;
    border: none;
    color: var(--accent-work);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.2s ease, color 0.6s ease;
  }
  .stats-toggle:hover { opacity: 1; }
  body.break-mode .stats-toggle { color: var(--accent-break); }
  .stats-toggle .chevron { display: inline-block; transition: transform 0.25s ease; }
  .stats-toggle.open .chevron { transform: rotate(180deg); }

  .stats-panel {
    display: none;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px 18px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .stats-panel.open { display: flex; }
  .stats-panel .stat-value { font-size: 18px; }

  /* Session complete flash */
  @keyframes flash {
    0% { opacity: 0; }
    30% { opacity: 1; }
    100% { opacity: 0; }
  }

  .flash-overlay {
    position: fixed;
    inset: 0;
    background: var(--glow-work);
    pointer-events: none;
    opacity: 0;
    z-index: 10;
  }
  .flash-overlay.active {
    animation: flash 0.8s ease-out forwards;
  }
  body.break-mode .flash-overlay { background: var(--glow-break); }

  /* Responsive */
  @media (max-width: 420px) {
    .card { padding: 32px 24px 28px; border-radius: 22px; }
    .timer-ring { width: 190px; height: 190px; }
    .timer-digits { font-size: 44px; }
    .btn-primary { padding: 12px 28px; }
    .stats { gap: 24px; }
  }
</style>
</head>
<body>
  <div class="flash-overlay" id="flash"></div>

  <div class="card">
    <div class="length-toggle" id="lengthToggle">
      <button class="length-btn" id="len25" data-min="25">25</button>
      <button class="length-btn" id="len50" data-min="50">50</button>
    </div>
    <div class="session-label" id="sessionLabel">Work Session</div>

    <div class="timer-ring">
      <svg viewBox="0 0 220 220">
        <circle class="track" cx="110" cy="110" r="100"></circle>
        <circle class="progress" id="progressRing" cx="110" cy="110" r="100"></circle>
      </svg>
      <div class="timer-display">
        <div class="timer-digits" id="timerDigits">50:00</div>
        <div class="timer-fraction" id="timerFraction">of 50 min</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-secondary" id="resetBtn">Reset</button>
      <button class="btn btn-primary" id="mainBtn">Start</button>
    </div>

    <input
      class="task-input"
      id="taskInput"
      type="text"
      placeholder="What are you focusing on?"
      maxlength="80"
    />

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="streakCount">0</span>
        <span class="stat-label">Day Streak</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="sessionCount">0</span>
        <span class="stat-label">Today</span>
      </div>
    </div>

    <button class="stats-toggle" id="statsToggle" aria-expanded="false" aria-controls="statsPanel">
      View all stats <span class="chevron">▾</span>
    </button>

    <div class="stats-panel" id="statsPanel">
      <div class="stat">
        <span class="stat-value" id="weekCount">0</span>
        <span class="stat-label">Week</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="monthCount">0</span>
        <span class="stat-label">Month</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="threeMoCount">0</span>
        <span class="stat-label">3 Months</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="yearCount">0</span>
        <span class="stat-label">Year</span>
      </div>
    </div>
  </div>

<script>
  // ── Config ──
  const REST_DURATION = 10 * 60;
  const STORAGE_KEY = 'pomodoro_data';
  let workMinutes = 25; // 25 or 50, restored from lengthPref on init

  // ==PURE-LOGIC-START==
  // DOM-free, deterministic helpers. `today` is always passed in (never new Date() here).
  function localDateKey(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function mostRecentMonday(date) {
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const day = d.getDay(); // 0=Sun .. 6=Sat
    const diff = (day === 0) ? 6 : day - 1; // days since Monday
    d.setDate(d.getDate() - diff);
    return d;
  }

  function computeStreak(history, today) {
    const cursor = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    // If today has no sessions yet, start counting from yesterday so an in-progress day doesn't break the streak.
    if (!history[localDateKey(cursor)]) {
      cursor.setDate(cursor.getDate() - 1);
    }
    let streak = 0;
    while (history[localDateKey(cursor)] > 0) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }
    return streak;
  }

  function sumRange(history, fromKey, toKey) {
    let total = 0;
    for (const key in history) {
      if (key >= fromKey && key <= toKey) total += history[key];
    }
    return total;
  }

  function computeTotals(history, today) {
    const todayKey = localDateKey(today);
    const weekStart = localDateKey(mostRecentMonday(today));
    const monthStart = localDateKey(new Date(today.getFullYear(), today.getMonth(), 1));
    const yearStart = localDateKey(new Date(today.getFullYear(), 0, 1));
    const ninety = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    ninety.setDate(ninety.getDate() - 89); // inclusive 90-day window
    const ninetyStart = localDateKey(ninety);
    return {
      today: history[todayKey] || 0,
      week: sumRange(history, weekStart, todayKey),
      month: sumRange(history, monthStart, todayKey),
      threeMonths: sumRange(history, ninetyStart, todayKey),
      year: sumRange(history, yearStart, todayKey),
    };
  }

  function migrate(raw) {
    if (raw && raw.version === 2) {
      return {
        version: 2,
        history: raw.history || {},
        lengthPref: raw.lengthPref === 50 ? 50 : 25,
      };
    }
    const result = { version: 2, history: {}, lengthPref: 25 };
    if (raw && typeof raw === 'object' && raw.date && raw.count > 0) {
      result.history[raw.date] = raw.count;
    }
    return result;
  }
  // ==PURE-LOGIC-END==

  // ── DOM refs ──
  const timerDigits = document.getElementById('timerDigits');
  const timerFraction = document.getElementById('timerFraction');
  const sessionLabel = document.getElementById('sessionLabel');
  const sessionCountEl = document.getElementById('sessionCount');
  const streakCountEl = document.getElementById('streakCount');
  const progressRing = document.getElementById('progressRing');
  const mainBtn = document.getElementById('mainBtn');
  const resetBtn = document.getElementById('resetBtn');
  const flash = document.getElementById('flash');
  const lengthToggle = document.getElementById('lengthToggle');
  const len25Btn = document.getElementById('len25');
  const len50Btn = document.getElementById('len50');
  const statsToggle = document.getElementById('statsToggle');
  const statsPanel = document.getElementById('statsPanel');
  const weekCountEl = document.getElementById('weekCount');
  const monthCountEl = document.getElementById('monthCount');
  const threeMoCountEl = document.getElementById('threeMoCount');
  const yearCountEl = document.getElementById('yearCount');

  // ── Progress ring setup ──
  const RADIUS = 100;
  const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
  progressRing.style.strokeDasharray = CIRCUMFERENCE;
  progressRing.style.strokeDashoffset = CIRCUMFERENCE;

  // ── State ──
  let timeLeft = workMinutes * 60;
  let isWork = true;
  let running = false;
  let interval = null;
  let hasStarted = false; // true once the current session has been started (until reset/re-arm)

  // ── Audio (generate a short beep using Web Audio API) ──
  function playNotification() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const playTone = (freq, start, dur) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.15, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(start);
        osc.stop(start + dur);
      };
      const now = ctx.currentTime;
      playTone(660, now, 0.15);
      playTone(880, now + 0.18, 0.15);
      playTone(660, now + 0.36, 0.2);
    } catch (e) {
      // Audio not available — fail silently
    }
  }

  // ── Storage (history model) ──
  function loadData() {
    let raw = null;
    try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch (e) { raw = null; }
    const data = migrate(raw);
    saveData(data);
    return data;
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function recordSession() {
    const data = loadData();
    const key = localDateKey(new Date());
    data.history[key] = (data.history[key] || 0) + 1;
    saveData(data);
    renderStats();
  }

  function renderStats() {
    const data = loadData();
    const now = new Date();
    const totals = computeTotals(data.history, now);
    const streak = computeStreak(data.history, now);
    streakCountEl.textContent = streak;
    sessionCountEl.textContent = totals.today;
    weekCountEl.textContent = totals.week;
    monthCountEl.textContent = totals.month;
    threeMoCountEl.textContent = totals.threeMonths;
    yearCountEl.textContent = totals.year;
  }

  // ── Timer display ──
  function formatTime(secs) {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }

  function updateDisplay() {
    timerDigits.textContent = formatTime(timeLeft);

    const total = isWork ? workMinutes * 60 : REST_DURATION;
    const progress = (total - timeLeft) / total;
    progressRing.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);

    timerFraction.textContent = `of ${total / 60} min`;
  }

  function updateLengthToggleUI() {
    len25Btn.classList.toggle('active', workMinutes === 25);
    len50Btn.classList.toggle('active', workMinutes === 50);
    // Locked while a session is started/running; editable only when idle/armed.
    const locked = hasStarted || running;
    lengthToggle.classList.toggle('locked', locked);
    // Also disable the buttons so keyboard users can't trigger them while locked
    // (pointer-events:none only blocks mouse/touch).
    len25Btn.disabled = locked;
    len50Btn.disabled = locked;
  }

  function setLength(minutes) {
    if (hasStarted || running) return; // only changeable when idle
    workMinutes = minutes;
    const data = loadData();
    data.lengthPref = minutes;
    saveData(data);
    // When idle, isWork is always true (reset/init force it), so this re-arms the
    // displayed work timer to the new length. The guard is harmless defense.
    if (isWork) {
      timeLeft = workMinutes * 60;
      updateDisplay();
    }
    updateLengthToggleUI();
  }

  len25Btn.addEventListener('click', () => setLength(25));
  len50Btn.addEventListener('click', () => setLength(50));

  statsToggle.addEventListener('click', () => {
    const open = statsPanel.classList.toggle('open');
    statsToggle.classList.toggle('open', open);
    statsToggle.setAttribute('aria-expanded', String(open));
  });

  // ── Session switching ──
  function triggerFlash() {
    flash.classList.remove('active');
    void flash.offsetWidth; // Force reflow
    flash.classList.add('active');
  }

  function switchSession() {
    if (isWork) {
      // Work finished -> record it and auto-start the 10-minute rest.
      recordSession();
      isWork = false;
      timeLeft = REST_DURATION;
      document.body.classList.add('break-mode');
      sessionLabel.textContent = 'Break Time';
      playNotification();
      triggerFlash();
      updateLengthToggleUI();
      updateDisplay();
      // running / hasStarted stay true so the rest keeps ticking; mainBtn stays
      // 'Pause' so the user can still pause the rest.
    } else {
      // Rest finished -> arm the next pomodoro but wait for the user to press Start.
      stopInterval();
      isWork = true;
      timeLeft = workMinutes * 60;
      document.body.classList.remove('break-mode');
      sessionLabel.textContent = 'Work Session';
      playNotification();
      triggerFlash();
      hasStarted = false;
      mainBtn.textContent = 'Start';
      timerFraction.classList.remove('visible');
      updateLengthToggleUI();
      updateDisplay();
    }
  }

  // ── Timer controls ──
  function tick() {
    if (timeLeft > 0) {
      timeLeft--;
      updateDisplay();
    } else {
      switchSession();
    }
  }

  function stopInterval() {
    running = false;
    clearInterval(interval);
    interval = null;
  }

  function start() {
    if (running) return;
    running = true;
    hasStarted = true;
    interval = setInterval(tick, 1000);
    mainBtn.textContent = 'Pause';
    timerFraction.classList.add('visible');
    updateLengthToggleUI();
  }

  function pause() {
    stopInterval();
    mainBtn.textContent = 'Resume';
    updateLengthToggleUI();
  }

  function reset() {
    stopInterval();
    isWork = true;
    hasStarted = false;
    timeLeft = workMinutes * 60;
    document.body.classList.remove('break-mode');
    sessionLabel.textContent = 'Work Session';
    mainBtn.textContent = 'Start';
    timerFraction.classList.remove('visible');
    updateLengthToggleUI();
    updateDisplay();
  }

  // ── Event listeners ──
  mainBtn.addEventListener('click', () => {
    running ? pause() : start();
  });

  resetBtn.addEventListener('click', reset);

  // ── Init ──
  const bootData = loadData();
  workMinutes = bootData.lengthPref;
  timeLeft = workMinutes * 60;
  updateLengthToggleUI();
  renderStats();
  updateDisplay();
</script>
</body>
</html>
