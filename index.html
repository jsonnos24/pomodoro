<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c1221;
    --card: rgba(22, 33, 56, 0.75);
    --card-border: rgba(56, 189, 248, 0.08);
    --surface: rgba(30, 44, 70, 0.6);
    --surface-hover: rgba(40, 58, 90, 0.7);
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent-work: #38bdf8;
    --accent-break: #a78bfa;
    --accent-warmup: #f59e0b;
    --ring-track: rgba(51, 65, 85, 0.5);
    --glow-work: rgba(56, 189, 248, 0.15);
    --glow-break: rgba(167, 139, 250, 0.15);
    --glow-warmup: rgba(245, 158, 11, 0.16);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100dvh;
    overflow-y: auto;
    padding: 20px 16px;
  }
  /* margin:auto centers the card when it fits but still allows scrolling
     from the top when it's taller than the viewport (avoids the flexbox
     centering clip bug on small screens). */
  .card { margin: auto; }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    width: 600px; height: 600px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: var(--glow-work);
    filter: blur(120px);
    transition: background 0.8s ease;
    pointer-events: none;
    z-index: 0;
  }
  body.break-mode::before { background: var(--glow-break); }

  .card {
    position: relative;
    z-index: 1;
    background: var(--card);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid var(--card-border);
    border-radius: 28px;
    padding: 44px 40px 36px;
    width: 380px;
    max-width: 92vw;
    text-align: center;
    box-shadow:
      0 4px 24px rgba(0,0,0,0.25),
      0 20px 60px rgba(0,0,0,0.2),
      inset 0 1px 0 rgba(255,255,255,0.04);
    transition: box-shadow 0.6s ease;
  }

  /* Length toggle */
  .length-toggle {
    display: inline-flex;
    gap: 4px;
    padding: 4px;
    margin-bottom: 18px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
  }
  .length-btn {
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 18px;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .length-btn.active {
    background: var(--accent-work);
    color: #0c1221;
  }
  body.break-mode .length-btn.active { background: var(--accent-break); }
  .length-toggle.locked { opacity: 0.4; pointer-events: none; }

  /* Session label */
  .session-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--accent-work);
    margin-bottom: 32px;
    transition: color 0.6s ease;
  }
  body.break-mode .session-label { color: var(--accent-break); }

  /* Timer ring container */
  .timer-ring {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 0 auto 24px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .timer-ring:focus-visible {
    outline: 2px solid var(--accent-work);
    outline-offset: 6px;
    border-radius: 50%;
  }
  body.break-mode .timer-ring:focus-visible { outline-color: var(--accent-break); }
  body.warmup-mode .timer-ring:focus-visible { outline-color: var(--accent-warmup); }

  .timer-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .timer-ring .track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 6;
  }

  .timer-ring .progress {
    fill: none;
    stroke: var(--accent-work);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.6s ease;
    filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.3));
  }
  body.break-mode .timer-ring .progress {
    stroke: var(--accent-break);
    filter: drop-shadow(0 0 6px rgba(167, 139, 250, 0.3));
  }

  /* Timer digits overlay */
  .timer-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .timer-digits {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: var(--text);
  }

  .timer-cue {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* Controls */
  .reset-btn {
    display: block;
    margin: 0 auto 24px;
  }
  .audio-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .btn {
    border: none;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    outline: none;
  }

  .btn-primary {
    padding: 14px 36px;
    background: var(--accent-work);
    color: #0c1221;
    box-shadow: 0 2px 12px rgba(56, 189, 248, 0.25);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(56, 189, 248, 0.35);
  }
  .btn-primary:active { transform: translateY(0); }

  body.break-mode .btn-primary {
    background: var(--accent-break);
    box-shadow: 0 2px 12px rgba(167, 139, 250, 0.25);
  }
  body.break-mode .btn-primary:hover {
    box-shadow: 0 4px 20px rgba(167, 139, 250, 0.35);
  }

  .btn-secondary {
    padding: 14px 20px;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.04);
  }
  .btn-secondary:hover {
    background: var(--surface-hover);
    color: var(--text);
  }

  /* Task input */
  .task-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease;
    margin-bottom: 24px;
  }
  .task-input::placeholder { color: var(--text-muted); opacity: 0.6; }
  .task-input:focus {
    border-color: rgba(56, 189, 248, 0.2);
    background: rgba(30, 44, 70, 0.8);
  }

  /* Plan panel */
  .plan-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .end-time-input {
    padding: 6px 10px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 9px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s ease;
    color-scheme: dark;
  }
  .end-time-input:focus { border-color: rgba(56, 189, 248, 0.35); }
  .plan-panel {
    display: none;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    text-align: left;
  }
  .plan-panel.open { display: block; }
  .plan-ctrl-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .plan-now-btn {
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    padding: 5px 10px;
    cursor: pointer;
  }
  .plan-now-btn:hover { color: var(--text); }
  .add-task-input { margin: 10px 0; }
  .task-list { display: flex; flex-direction: column; }
  .plan-summary {
    margin-top: 12px;
    font-size: 13px;
    color: var(--text);
    text-align: center;
  }
  .plan-summary .ok { color: var(--accent-work); font-weight: 700; }
  .plan-summary .over { color: var(--accent-warmup); font-weight: 700; }
  body.break-mode .plan-summary .ok { color: var(--accent-break); }
  .plan-empty-msg { color: var(--text-muted); font-size: 12px; padding: 6px 0; }

  .stats-toggle {
    margin: 18px auto 0;
    display: block;
    background: transparent;
    border: none;
    color: var(--accent-work);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.2s ease, color 0.6s ease;
  }
  .stats-toggle:hover { opacity: 1; }
  body.break-mode .stats-toggle { color: var(--accent-break); }
  .stats-toggle .chevron { display: inline-block; transition: transform 0.25s ease; }
  .stats-toggle.open .chevron { transform: rotate(180deg); }

  /* Session complete flash */
  @keyframes flash {
    0% { opacity: 0; }
    30% { opacity: 1; }
    100% { opacity: 0; }
  }

  .flash-overlay {
    position: fixed;
    inset: 0;
    background: var(--glow-work);
    pointer-events: none;
    opacity: 0;
    z-index: 10;
  }
  .flash-overlay.active {
    animation: flash 0.8s ease-out forwards;
  }
  body.break-mode .flash-overlay { background: var(--glow-break); }

  /* Warm-up ("pre-heat") mode — amber */
  body.warmup-mode::before { background: var(--glow-warmup); }
  body.warmup-mode .session-label { color: var(--accent-warmup); }
  body.warmup-mode .timer-ring .progress {
    stroke: var(--accent-warmup);
    filter: drop-shadow(0 0 6px rgba(245, 158, 11, 0.35));
  }
  body.warmup-mode .btn-primary {
    background: var(--accent-warmup);
    box-shadow: 0 2px 12px rgba(245, 158, 11, 0.25);
  }
  body.warmup-mode .btn-primary:hover { box-shadow: 0 4px 20px rgba(245, 158, 11, 0.35); }
  body.warmup-mode .length-btn.active { background: var(--accent-warmup); }
  body.warmup-mode .flash-overlay { background: var(--glow-warmup); }
  body.warmup-mode .stats-toggle { color: var(--accent-warmup); }

  /* Warm-up toggle (switch under the length picker) */
  .warmup-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }
  .warmup-toggle input { position: absolute; opacity: 0; width: 0; height: 0; }
  .warmup-switch {
    flex: none;
    width: 34px;
    height: 18px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    position: relative;
    transition: background 0.2s ease;
  }
  .warmup-switch::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s ease;
  }
  .warmup-toggle input:checked + .warmup-switch { background: var(--accent-warmup); }
  .warmup-toggle input:checked + .warmup-switch::after { transform: translateX(16px); }
  .warmup-toggle input:focus-visible + .warmup-switch { outline: 2px solid var(--accent-warmup); outline-offset: 2px; }
  .warmup-toggle.locked { opacity: 0.4; pointer-events: none; }
  .warmup-hint {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 22px;
    max-width: 240px;
    margin-left: auto;
    margin-right: auto;
  }

  /* History */
  .history-panel {
    display: none;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    text-align: left;
  }
  .history-panel.open { display: block; }
  .history-list.scroll { max-height: 220px; overflow-y: auto; }
  .hist-day {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin: 10px 0 4px;
  }
  .hist-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
  }
  .hist-meta {
    color: var(--text-muted);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .hist-task {
    color: var(--text);
    cursor: text;
    border-radius: 4px;
    padding: 1px 3px;
    overflow-wrap: anywhere;
  }
  .hist-task:hover { background: var(--surface); }
  .hist-task-empty { color: var(--text-muted); font-style: italic; }
  .hist-edit {
    font-family: inherit;
    font-size: 12px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid rgba(56,189,248,0.35);
    border-radius: 4px;
    padding: 1px 4px;
    outline: none;
    flex: 1;
    min-width: 0;
  }
  .hist-empty { color: var(--text-muted); font-size: 12px; padding: 6px 0; }
  .hist-more {
    display: block;
    margin: 8px auto 0;
    background: transparent;
    border: none;
    color: var(--accent-work);
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    opacity: 0.85;
  }
  .hist-more:hover { opacity: 1; }
  body.break-mode .hist-more { color: var(--accent-break); }

  /* Task rows (Plan panel) */
  .task-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 6px;
    border-radius: 8px;
    font-size: 12px;
  }
  .task-row:nth-child(odd) { background: rgba(255,255,255,0.03); } /* zebra */
  .task-row.active { background: rgba(56,189,248,0.12); }
  body.break-mode .task-row.active { background: rgba(167,139,250,0.12); }
  .task-row.done .task-name { text-decoration: line-through; color: var(--text-muted); }
  .task-reorder { display: flex; flex-direction: column; line-height: 0.7; }
  .task-name { flex: 1; min-width: 0; cursor: text; overflow-wrap: anywhere; color: var(--text); }
  .task-window { color: var(--text-muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .task-stepper { display: inline-flex; align-items: center; gap: 4px; }
  .task-count { font-variant-numeric: tabular-nums; min-width: 22px; text-align: center; }
  .task-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    padding: 1px 4px;
    border-radius: 4px;
  }
  .task-btn:hover { color: var(--text); background: var(--surface); }
  .task-edit-input {
    flex: 1; min-width: 0;
    font-family: inherit; font-size: 12px;
    background: var(--surface); color: var(--text);
    border: 1px solid rgba(56,189,248,0.35); border-radius: 4px;
    padding: 1px 4px; outline: none;
  }

  .pill-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 6px; }
  .pill {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    font-family: inherit; font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 999px; cursor: pointer;
  }
  .pill:hover { background: var(--surface-hover); }
  .pill .pill-x { color: var(--text-muted); margin-left: 6px; }
  .pill-edit-toggle {
    background: transparent; border: none; color: var(--accent-work);
    font-family: inherit; font-size: 11px; font-weight: 600; cursor: pointer; padding: 4px;
  }
  body.break-mode .pill-edit-toggle { color: var(--accent-break); }
  .pill-add-input {
    font-family: inherit; font-size: 11px;
    background: var(--surface); color: var(--text);
    border: 1px solid rgba(56,189,248,0.35); border-radius: 999px;
    padding: 4px 10px; outline: none; width: 130px;
  }

  /* Audio controls (mute speaker + sound picker, centered above Reset) */
  .mute-btn {
    background: transparent;
    border: none;
    font-size: 18px;
    line-height: 1;
    padding: 2px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s ease;
  }
  .mute-btn:hover { opacity: 1; }
  .sound-select {
    background: var(--surface);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    font-family: inherit;
    font-size: 11px;
    padding: 4px 6px;
    cursor: pointer;
    outline: none;
  }

  /* Responsive */
  @media (max-width: 420px) {
    .card { padding: 32px 24px 28px; border-radius: 22px; }
    .timer-ring { width: 190px; height: 190px; }
    .timer-digits { font-size: 44px; }
    .btn-primary { padding: 12px 28px; }
    .stats { gap: 24px; }
  }
</style>
</head>
<body>
  <div class="flash-overlay" id="flash"></div>

  <div class="card">
    <div class="length-toggle" id="lengthToggle">
      <button class="length-btn" id="len25" data-min="25">25</button>
      <button class="length-btn" id="len50" data-min="50">50</button>
    </div>

    <label class="warmup-toggle" id="warmupToggle">
      <input type="checkbox" id="warmupCheck">
      <span class="warmup-switch" aria-hidden="true"></span>
      <span class="warmup-text">🔥 Just pre-heat the oven · 5 min</span>
    </label>
    <p class="warmup-hint">Set up your workspace for 5 min — then your session begins.</p>

    <div class="session-label" id="sessionLabel">Work Session</div>

    <div class="timer-ring" id="timerRing" role="button" tabindex="0" aria-label="Start or pause the timer">
      <svg viewBox="0 0 220 220">
        <circle class="track" cx="110" cy="110" r="100"></circle>
        <circle class="progress" id="progressRing" cx="110" cy="110" r="100"></circle>
      </svg>
      <div class="timer-display">
        <div class="timer-digits" id="timerDigits">25:00</div>
        <div class="timer-cue" id="timerCue">Tap to start</div>
      </div>
    </div>

    <div class="audio-row">
      <button class="mute-btn" id="muteBtn" type="button" aria-label="Toggle sound" title="Sound on / off">🔊</button>
      <select class="sound-select" id="soundSelect" aria-label="End-of-session sound" title="End-of-session sound">
        <option value="chime">Chime</option>
        <option value="bell">Bell</option>
        <option value="arcade">Arcade</option>
      </select>
    </div>

    <button class="btn btn-secondary reset-btn" id="resetBtn">Reset</button>

    <input
      class="task-input"
      id="taskInput"
      type="text"
      placeholder="What are you focusing on?"
      maxlength="80"
    />

    <button class="stats-toggle plan-toggle" id="planToggle" aria-expanded="false" aria-controls="planPanel">
      Plan <span class="chevron">▾</span>
    </button>

    <div class="plan-panel" id="planPanel">
      <div class="plan-ctrl-row">
        <label class="plan-label" for="startTimeInput">Start</label>
        <input type="time" id="startTimeInput" class="end-time-input" aria-label="When the schedule starts" />
        <button type="button" class="plan-now-btn" id="startNowBtn" title="Start from now">now</button>
      </div>
      <div class="plan-ctrl-row">
        <label class="plan-label" for="endTimeInput">Done by</label>
        <input type="time" id="endTimeInput" class="end-time-input" aria-label="What time you want to finish today" />
      </div>

      <div class="pill-row" id="pillRow"></div>

      <input class="task-input add-task-input" id="addTaskInput" type="text" placeholder="Add a task…" maxlength="80" />

      <div class="task-list" id="taskList"></div>
      <div class="plan-summary" id="planSummary"></div>
    </div>

    <button class="stats-toggle history-toggle" id="historyToggle" aria-expanded="false" aria-controls="historyPanel">
      History <span class="chevron">▾</span>
    </button>

    <div class="history-panel" id="historyPanel">
      <div class="history-list" id="historyList"></div>
      <button class="hist-more" id="historyMore" type="button" style="display:none"></button>
    </div>

  </div>

<script>
  // ── Config ──
  const REST_DURATION = 10 * 60;
  const WARMUP_DURATION = 5 * 60;
  const STORAGE_KEY = 'pomodoro_data';
  let workMinutes = 25; // 25 or 50, restored from lengthPref on init

  // ==PURE-LOGIC-START==
  // DOM-free, deterministic helpers. `today` is always passed in (never new Date() here).
  function localDateKey(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  // How many focus sessions of `focusMin` fit into `remainingMin`, with a `breakMin`
  // break between each (but no trailing break after the last one). Clamped at 0.
  function pomodorosLeft(remainingMin, focusMin, breakMin) {
    if (remainingMin < focusMin) return 0;
    return Math.floor((remainingMin + breakMin) / (focusMin + breakMin));
  }

  // Lay the not-done tasks end-to-end. A `count=n` task = n focus blocks + (n-1) internal
  // breaks; one break sits between consecutive tasks; no trailing break after the last session.
  function buildSchedule(plan, opts) {
    const focusMs = opts.focusMin * 60000;
    const breakMs = opts.breakMin * 60000;
    const blocks = [];
    let cursor = opts.startMs;
    let first = true;
    for (const task of plan) {
      if (task.done) continue;
      const count = Math.max(0, Math.floor(task.count));
      if (count <= 0) continue;
      if (!first) cursor += breakMs;
      const startMs = cursor;
      const endMs = startMs + count * focusMs + (count - 1) * breakMs;
      blocks.push({ taskId: task.id, name: task.name, remaining: count, startMs, endMs });
      cursor = endMs;
      first = false;
    }
    return blocks;
  }

  function scheduleFinish(plan, opts) {
    const blocks = buildSchedule(plan, opts);
    return blocks.length ? blocks[blocks.length - 1].endMs : null;
  }

  // Compare the projected finish against today's "HH:MM" deadline. nowMs supplies the date.
  function deadlineCheck(finishMs, endTime, nowMs) {
    if (!endTime || finishMs == null) return null;
    const now = new Date(nowMs);
    const [h, m] = endTime.split(':').map(Number);
    const deadline = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0).getTime();
    const deltaMin = Math.round((deadline - finishMs) / 60000);
    return { madeIt: deltaMin >= 0, deltaMin };
  }

  // 'YYYY-MM-DD' -> epoch ms at local noon (used to place migrated counts on their day).
  function dayKeyToNoon(key) {
    const [y, m, d] = key.split('-').map(Number);
    return new Date(y, m - 1, d, 12, 0, 0).getTime();
  }

  const PILL_SEEDS = ['CTS Emails', 'Rockstar Emails', 'CTS Pipeline', 'Lesson Planning', 'Song writing'];

  function normalizePlan(raw) {
    if (!Array.isArray(raw)) return [];
    return raw.map((t, i) => ({
      id: (t && t.id != null) ? String(t.id) : `t${i}`,
      name: (t && typeof t.name === 'string') ? t.name.slice(0, 80) : '',
      count: (t && Number.isFinite(t.count)) ? Math.max(1, Math.floor(t.count)) : 1,
      done: !!(t && t.done),
    }));
  }

  function normalizePills(raw) {
    if (!Array.isArray(raw)) return PILL_SEEDS.slice();
    return raw.filter((p) => typeof p === 'string' && p.trim()).map((p) => p.slice(0, 80));
  }

  function activeTaskId(plan) {
    for (const task of plan) if (!task.done) return task.id;
    return null;
  }

  // Returns a new plan with the active task's count decremented; done at 0.
  function completeOnePomodoro(plan) {
    const id = activeTaskId(plan);
    return plan.map((task) => {
      if (task.id !== id) return Object.assign({}, task);
      const count = Math.max(0, task.count - 1);
      return Object.assign({}, task, { count, done: count <= 0 });
    });
  }

  // Normalize any stored shape to v4 (a per-session log with plan and pills).
  function migrate(raw) {
    const fresh = { version: 4, sessions: [], lengthPref: 25, sound: 'chime', muted: false, preheat: false, endTime: '', plan: [], startOverride: '', pills: PILL_SEEDS.slice() };
    if (!raw || typeof raw !== 'object') return fresh;

    if (raw.version === 3 || raw.version === 4) {
      return {
        version: 4,
        sessions: Array.isArray(raw.sessions) ? raw.sessions : [],
        lengthPref: raw.lengthPref === 50 ? 50 : 25,
        sound: ['chime', 'bell', 'arcade'].includes(raw.sound) ? raw.sound : 'chime',
        muted: raw.muted === true,
        preheat: raw.preheat === true,
        endTime: typeof raw.endTime === 'string' ? raw.endTime : '',
        plan: normalizePlan(raw.plan),
        startOverride: typeof raw.startOverride === 'string' ? raw.startOverride : '',
        pills: ('pills' in raw) ? normalizePills(raw.pills) : PILL_SEEDS.slice(),
      };
    }

    // Older formats (v2 per-day counts, or the original single counter) -> synthesize sessions.
    const result = Object.assign({}, fresh, { lengthPref: raw.lengthPref === 50 ? 50 : 25 });
    const addMigrated = (dateKey, count) => {
      for (let i = 0; i < count; i++) {
        result.sessions.push({ id: `m${dateKey}-${i}`, ts: dayKeyToNoon(dateKey), minutes: null, task: '', migrated: true });
      }
    };
    if (raw.version === 2 && raw.history && typeof raw.history === 'object') {
      for (const dateKey in raw.history) addMigrated(dateKey, raw.history[dateKey]);
    } else if (raw.date && raw.count > 0) {
      addMigrated(raw.date, raw.count);
    }
    return result;
  }
  // ==PURE-LOGIC-END==

  // ── DOM refs ──
  const timerDigits = document.getElementById('timerDigits');
  const timerCue = document.getElementById('timerCue');
  const timerRing = document.getElementById('timerRing');
  const sessionLabel = document.getElementById('sessionLabel');
  const progressRing = document.getElementById('progressRing');
  const resetBtn = document.getElementById('resetBtn');
  const flash = document.getElementById('flash');
  const taskInput = document.getElementById('taskInput');
  const lengthToggle = document.getElementById('lengthToggle');
  const len25Btn = document.getElementById('len25');
  const len50Btn = document.getElementById('len50');
  const warmupToggle = document.getElementById('warmupToggle');
  const warmupCheck = document.getElementById('warmupCheck');
  const muteBtn = document.getElementById('muteBtn');
  const soundSelect = document.getElementById('soundSelect');
  const historyToggle = document.getElementById('historyToggle');
  const historyPanel = document.getElementById('historyPanel');
  const historyList = document.getElementById('historyList');
  const historyMore = document.getElementById('historyMore');
  const endTimeInput = document.getElementById('endTimeInput');
  const planToggle = document.getElementById('planToggle');
  const planPanel = document.getElementById('planPanel');
  const startTimeInput = document.getElementById('startTimeInput');
  const startNowBtn = document.getElementById('startNowBtn');
  const pillRow = document.getElementById('pillRow');
  const addTaskInput = document.getElementById('addTaskInput');
  const taskList = document.getElementById('taskList');
  const planSummary = document.getElementById('planSummary');

  // ── Progress ring setup ──
  const RADIUS = 100;
  const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
  progressRing.style.strokeDasharray = CIRCUMFERENCE;
  progressRing.style.strokeDashoffset = CIRCUMFERENCE;

  // ── State ──
  let timeLeft = workMinutes * 60;
  let phase = 'work'; // 'warmup' | 'work' | 'break'
  let running = false;
  let interval = null;
  let hasStarted = false; // true once the current session has been started (until reset/re-arm)
  let soundName = 'chime'; // chime | bell | arcade, restored on init
  let muted = false;       // restored on init
  let preheat = false;     // 5-min "pre-heat the oven" warm-up enabled; restored on init

  // ── Audio (synthesized via Web Audio API; one shared, lazily-created context) ──
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { audioCtx = null; }
    }
    // Resume must happen inside a user gesture; callers invoke this from clicks.
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone(ctx, freq, start, dur, type) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(0.15, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(start);
    osc.stop(start + dur);
  }

  const SOUNDS = {
    chime(ctx, t) { playTone(ctx, 660, t, 0.15); playTone(ctx, 880, t + 0.18, 0.15); playTone(ctx, 660, t + 0.36, 0.2); },
    bell(ctx, t) { playTone(ctx, 880, t, 1.1); playTone(ctx, 1320, t, 0.9); }, // fundamental + fifth, long decay
    arcade(ctx, t) { [392, 523, 659, 784].forEach((f, i) => playTone(ctx, f, t + i * 0.08, 0.09, 'square')); },
  };

  // Play a sound by name regardless of mute (used for the picker preview).
  function playSound(name) {
    const ctx = getAudioCtx();
    if (!ctx) return;
    try { (SOUNDS[name] || SOUNDS.chime)(ctx, ctx.currentTime); } catch (e) { /* ignore */ }
  }

  // Single end-of-session sound, respects the mute toggle (used for the gentle warm-up roll-over).
  function playEndSound() {
    if (!muted) playSound(soundName);
  }

  // Vibrate on mobile where supported. Independent of mute — it's the silent nudge.
  function vibrate(pattern) {
    if (typeof navigator !== 'undefined' && navigator.vibrate) {
      try { navigator.vibrate(pattern || [200, 100, 200]); } catch (e) { /* ignore */ }
    }
  }

  // Attention alert for real session boundaries: sound (if unmuted) + vibrate, repeating
  // every few seconds while the tab is hidden — but only a few times so it stops nagging.
  const ALERT_MAX_FIRES = 3;            // total alerts per session boundary
  let alertRepeatTimer = null;
  let alertCount = 0;
  function fireAlertOnce() {
    if (!muted) playSound(soundName);
    vibrate();
    alertCount++;
  }
  function playEndAlert() {
    alertCount = 0;
    fireAlertOnce();                    // first of the 3
    if (document.hidden) startAlertRepeat();
  }
  function startAlertRepeat() {
    stopAlertRepeat();
    alertRepeatTimer = setInterval(() => {
      fireAlertOnce();                  // gentle spacing, not a blare
      if (alertCount >= ALERT_MAX_FIRES) stopAlertRepeat();
    }, 4000);
  }
  function stopAlertRepeat() {
    if (alertRepeatTimer) { clearInterval(alertRepeatTimer); alertRepeatTimer = null; }
  }

  // ── Storage (history model) ──
  function loadData() {
    let raw = null;
    try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch (e) { raw = null; }
    const data = migrate(raw);
    saveData(data);
    return data;
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function newId() {
    return (window.crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : Date.now() + '-' + Math.random().toString(36).slice(2, 8);
  }

  function recordSession() {
    const data = loadData();
    data.sessions.push({ id: newId(), ts: Date.now(), minutes: workMinutes, task: taskInput.value.trim() });
    saveData(data);
    renderHistory();
  }

  // ── Plan ──
  const BREAK_MINUTES = REST_DURATION / 60; // breaks count against the schedule

  function scheduleStartMs() {
    const data = loadData();
    const now = new Date();
    if (data.startOverride) {
      const [h, m] = data.startOverride.split(':').map(Number);
      return new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0).getTime();
    }
    return now.getTime();
  }

  function formatClock(ms) {
    return new Date(ms).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }

  function planScheduleOpts() {
    return { startMs: scheduleStartMs(), focusMin: workMinutes, breakMin: BREAK_MINUTES };
  }

  function rowHtmlForTask(task, block, isActive) {
    const cls = 'task-row' + (isActive ? ' active' : '') + (task.done ? ' done' : '');
    const window = block ? `${formatClock(block.startMs)}–${formatClock(block.endMs)}` : '';
    const name = task.name ? escapeHtml(task.name) : 'Untitled task';
    return `
      <div class="${cls}" data-id="${escapeHtml(task.id)}">
        <div class="task-reorder">
          <button type="button" class="task-btn" data-act="up" aria-label="Move up">▲</button>
          <button type="button" class="task-btn" data-act="down" aria-label="Move down">▼</button>
        </div>
        <span class="task-name" data-act="edit" title="Click to edit">${name}</span>
        <span class="task-window">${window}</span>
        <span class="task-stepper">
          <button type="button" class="task-btn" data-act="dec" aria-label="Fewer pomodoros">−</button>
          <span class="task-count">×${task.count}</span>
          <button type="button" class="task-btn" data-act="inc" aria-label="More pomodoros">+</button>
        </span>
        <button type="button" class="task-btn task-check" data-act="check" aria-label="Mark done / skip">${task.done ? '↺' : '✓'}</button>
        <button type="button" class="task-btn task-del" data-act="del" aria-label="Delete task">✕</button>
      </div>`;
  }

  // Write the active task's name into the timer's task field (editable; does not mutate the plan).
  function loadActiveTaskName() {
    const data = loadData();
    const id = activeTaskId(data.plan);
    const task = id ? data.plan.find((x) => x.id === id) : null;
    taskInput.value = task ? task.name : '';
  }

  function renderPlan() {
    const data = loadData();
    const plan = data.plan;
    const opts = planScheduleOpts();
    const blocks = buildSchedule(plan, opts);
    const blockByTask = {};
    for (const b of blocks) blockByTask[b.taskId] = b;
    const activeId = activeTaskId(plan);

    if (!plan.length) {
      taskList.innerHTML = '<div class="plan-empty-msg">Add tasks to plan your day.</div>';
    } else {
      taskList.innerHTML = plan.map((task) => rowHtmlForTask(task, blockByTask[task.id], task.id === activeId)).join('');
    }

    // Summary
    const finish = scheduleFinish(plan, opts);
    if (!plan.length) {
      planSummary.textContent = '';
    } else if (finish == null) {
      planSummary.textContent = 'All done 🎉';
    } else {
      const check = deadlineCheck(finish, data.endTime, Date.now());
      let tail = '';
      if (check) {
        tail = check.madeIt
          ? ` · <span class="ok">✅ ${check.deltaMin} min early</span>`
          : ` · <span class="over">⚠️ runs ${-check.deltaMin} min over</span>`;
      }
      planSummary.innerHTML = `Finishes ~${formatClock(finish)}${tail}`;
    }
  }

  // ── Plan mutation helpers ──
  function addTask(name) {
    const trimmed = name.trim();
    if (!trimmed) return;
    const data = loadData();
    data.plan.push({ id: newId(), name: trimmed.slice(0, 80), count: 1, done: false });
    saveData(data);
    renderPlan();
  }

  function updateTask(id, patch) {
    const data = loadData();
    const task = data.plan.find((x) => x.id === id);
    if (!task) return;
    Object.assign(task, patch);
    saveData(data);
    renderPlan();
  }

  function removeTask(id) {
    const data = loadData();
    data.plan = data.plan.filter((x) => x.id !== id);
    saveData(data);
    renderPlan();
  }

  function moveTask(id, dir) {
    const data = loadData();
    const i = data.plan.findIndex((x) => x.id === id);
    const j = i + dir;
    if (i < 0 || j < 0 || j >= data.plan.length) return;
    const [moved] = data.plan.splice(i, 1);
    data.plan.splice(j, 0, moved);
    saveData(data);
    renderPlan();
  }

  // ── Pills ──
  let pillEditMode = false;

  function renderPills() {
    const data = loadData();
    let html = data.pills.map((p, i) =>
      `<button type="button" class="pill" data-i="${i}">${escapeHtml(p)}${pillEditMode ? '<span class="pill-x" data-x="' + i + '">✕</span>' : ''}</button>`
    ).join('');
    if (pillEditMode) {
      html += '<input class="pill-add-input" id="pillAddInput" type="text" placeholder="New pill…" maxlength="80" />';
    }
    html += `<button type="button" class="pill-edit-toggle" id="pillEditToggle">${pillEditMode ? 'done' : '✎'}</button>`;
    pillRow.innerHTML = html;
    if (pillEditMode) {
      const add = document.getElementById('pillAddInput');
      add.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const v = add.value.trim();
          if (v) { const d = loadData(); d.pills.push(v.slice(0, 80)); saveData(d); renderPills(); }
        }
      });
    }
  }

  pillRow.addEventListener('click', (e) => {
    if (e.target.id === 'pillEditToggle') { pillEditMode = !pillEditMode; renderPills(); return; }
    const x = e.target.closest('[data-x]');
    if (x) {
      const d = loadData();
      d.pills.splice(Number(x.dataset.x), 1);
      saveData(d);
      renderPills();
      return;
    }
    const pill = e.target.closest('.pill');
    if (pill && !pillEditMode) {
      addTask(loadData().pills[Number(pill.dataset.i)]);
    }
  });

  // ── Add-task input ──
  addTaskInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      addTask(addTaskInput.value);
      addTaskInput.value = '';
    }
  });

  // ── Task list click delegation ──
  taskList.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    const row = e.target.closest('.task-row');
    if (!row) return;
    const id = row.dataset.id;
    const data = loadData();
    const task = data.plan.find((x) => x.id === id);
    if (!task) return;

    switch (btn.dataset.act) {
      case 'up': moveTask(id, -1); break;
      case 'down': moveTask(id, 1); break;
      case 'inc': updateTask(id, { count: task.count + 1 }); break;
      case 'dec': updateTask(id, { count: Math.max(1, task.count - 1) }); break;
      case 'del': removeTask(id); break;
      case 'check': updateTask(id, { done: !task.done }); break;
      case 'edit': startTaskNameEdit(row, id); break;
    }
  });

  // ── Inline task name editing ──
  function startTaskNameEdit(row, id) {
    const span = row.querySelector('.task-name');
    if (!span) return;
    const data = loadData();
    const task = data.plan.find((x) => x.id === id);
    if (!task) return;
    const input = document.createElement('input');
    input.className = 'task-edit-input';
    input.value = task.name;
    input.maxLength = 80;
    span.replaceWith(input);
    input.focus();
    input.select();
    let done = false;
    const commit = (save) => {
      if (done) return;
      done = true;
      if (save) {
        const v = input.value.trim();
        if (v) updateTask(id, { name: v.slice(0, 80) }); else renderPlan(); // empty reverts
      } else { renderPlan(); }
    };
    input.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') commit(true);
      else if (ev.key === 'Escape') commit(false);
    });
    input.addEventListener('blur', () => commit(true));
  }

  planToggle.addEventListener('click', () => {
    const open = planPanel.classList.toggle('open');
    planToggle.classList.toggle('open', open);

  startTimeInput.addEventListener('input', () => {
    const data = loadData();

    saveData(data);

  startNowBtn.addEventListener('click', () => {
    const data = loadData();
    data.startOverride = '';
    saveData(data);
    startTimeInput.value = '';
    renderPlan();
  });

  endTimeInput.addEventListener('input', () => {
    const data = loadData();
    data.endTime = endTimeInput.value;
    saveData(data);
    renderPlan();
  });

  // ── History ──
  let historyExpanded = false;

  function escapeHtml(str) {
    return str.replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  }

  function dayHeading(ts, now) {
    const key = localDateKey(new Date(ts));
    const todayKey = localDateKey(now);
    const y = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    y.setDate(y.getDate() - 1);
    if (key === todayKey) return 'Today';
    if (key === localDateKey(y)) return 'Yesterday';
    return new Date(ts).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function rowHtml(s) {
    const hasTask = s.task && s.task.trim();
    const taskText = hasTask ? escapeHtml(s.task) : 'Focus session';
    const cls = hasTask ? 'hist-task' : 'hist-task hist-task-empty';
    let meta = '';
    if (!s.migrated && s.minutes) {
      const time = new Date(s.ts).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      meta = `<span class="hist-meta">${time} · ${s.minutes}m</span>`;
    }
    return `<div class="hist-row">${meta}<span class="${cls}" data-id="${escapeHtml(String(s.id))}" title="Click to edit">${taskText}</span></div>`;
  }

  function renderHistory() {
    const sessions = loadData().sessions.slice().sort((a, b) => b.ts - a.ts);
    const now = new Date();
    const max = historyExpanded ? Infinity : 3;
    let html = '';
    let rows = 0;
    let lastDay = null;
    for (const s of sessions) {
      if (rows >= max) break;
      const day = dayHeading(s.ts, now);
      if (day !== lastDay) { html += `<div class="hist-day">${day}</div>`; lastDay = day; }
      html += rowHtml(s);
      rows++;
    }
    historyList.innerHTML = html || '<div class="hist-empty">No pomodoros yet — your completed sessions will appear here.</div>';
    historyList.classList.toggle('scroll', historyExpanded);
    if (sessions.length > 3) {
      historyMore.style.display = '';
      historyMore.textContent = historyExpanded ? 'Show less' : `Show all (${sessions.length})`;
    } else {
      historyMore.style.display = 'none';
    }
  }

  // Inline edit of a session's task label (event-delegated on the list).
  historyList.addEventListener('click', (e) => {
    const span = e.target.closest && e.target.closest('.hist-task');
    if (span) startTaskEdit(span);
  });

  function startTaskEdit(span) {
    const id = span.dataset.id;
    const data = loadData();
    const s = data.sessions.find((x) => String(x.id) === id);
    if (!s) return;
    const input = document.createElement('input');
    input.className = 'hist-edit';
    input.value = s.task || '';
    input.maxLength = 80;
    span.replaceWith(input);
    input.focus();
    input.select();
    let done = false;
    const commit = (save) => {
      if (done) return;
      done = true;
      if (save) { s.task = input.value.trim(); saveData(data); }
      renderHistory();
    };
    input.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') commit(true);
      else if (ev.key === 'Escape') commit(false);
    });
    input.addEventListener('blur', () => commit(true));
  }

  historyToggle.addEventListener('click', () => {
    const open = historyPanel.classList.toggle('open');
    historyToggle.classList.toggle('open', open);
    historyToggle.setAttribute('aria-expanded', String(open));
    if (open) renderHistory();
  });

  historyMore.addEventListener('click', () => {
    historyExpanded = !historyExpanded;
    renderHistory();
  });

  // ── Timer display ──
  function formatTime(secs) {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }

  // ── Phase helpers (warmup | work | break) ──
  function phaseDuration(p) {
    if (p === 'warmup') return WARMUP_DURATION;
    if (p === 'break') return REST_DURATION;
    return workMinutes * 60;
  }
  function phaseLabel(p) {
    if (p === 'warmup') return 'Pre-Heating';
    if (p === 'break') return 'Break Time';
    return 'Work Session';
  }
  function phaseTitleWord(p) {
    if (p === 'warmup') return 'Pre-heating';
    if (p === 'break') return 'Break';
    return 'Focus';
  }
  function applyPhaseMode() {
    document.body.classList.toggle('warmup-mode', phase === 'warmup');
    document.body.classList.toggle('break-mode', phase === 'break');
    sessionLabel.textContent = phaseLabel(phase);
  }

  function updateDisplay() {
    timerDigits.textContent = formatTime(timeLeft);

    const total = phaseDuration(phase);
    const progress = (total - timeLeft) / total;
    progressRing.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);

    updateCue();
    updateTitle();
  }

  // The ring is the start/pause control; this line tells the user what a tap does.
  function updateCue() {
    if (!hasStarted) timerCue.textContent = 'Tap to start';
    else if (running) timerCue.textContent = 'Tap to pause';
    else timerCue.textContent = 'Tap to resume';
  }

  // Reflect the countdown in the browser tab title while a session is active.
  function updateTitle() {
    if (titleFlashing) return; // the flash owns the title until the tab regains focus
    if (!hasStarted) { document.title = 'Pomodoro'; return; }
    const prefix = running ? '' : '⏸ '; // pause marker when stopped mid-session
    document.title = `${prefix}${formatTime(timeLeft)} · ${phaseTitleWord(phase)}`;
  }

  // ── End-of-session tab-title flash (only when the tab is in the background) ──
  let titleFlashing = false;
  let flashTimer = null;
  function startTitleFlash(message) {
    stopTitleFlash();
    if (!document.hidden) return; // you're already looking — no need to blink
    titleFlashing = true;
    let on = true;
    let blinks = 0;
    document.title = message;
    flashTimer = setInterval(() => {
      on = !on;
      document.title = on ? message : "⏰ Time's up!";
      if (++blinks >= 30) stopTitleFlash(); // safety cap so it can't blink forever
    }, 1000);
  }
  function stopTitleFlash() {
    if (flashTimer) { clearInterval(flashTimer); flashTimer = null; }
    if (titleFlashing) { titleFlashing = false; updateTitle(); }
  }
  // When the user returns to the tab, stop both the title flash and the repeating sound.
  function stopAlerts() { stopTitleFlash(); stopAlertRepeat(); }
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) { stopAlerts(); renderPlan(); } // recount when you come back to the tab
  });
  window.addEventListener('focus', stopAlerts);

  setInterval(renderPlan, 60000); // tick down through the day while the tab is open

  function updateLengthToggleUI() {
    len25Btn.classList.toggle('active', workMinutes === 25);
    len50Btn.classList.toggle('active', workMinutes === 50);
    // Locked while a session is started/running; editable only when idle/armed.
    const locked = hasStarted || running;
    lengthToggle.classList.toggle('locked', locked);
    // Also disable the buttons so keyboard users can't trigger them while locked
    // (pointer-events:none only blocks mouse/touch).
    len25Btn.disabled = locked;
    len50Btn.disabled = locked;
    warmupToggle.classList.toggle('locked', locked);
    warmupCheck.disabled = locked;
  }

  function setLength(minutes) {
    if (hasStarted || running) return; // only changeable when idle
    workMinutes = minutes;
    const data = loadData();
    data.lengthPref = minutes;
    saveData(data);
    // When idle the phase is always 'work', so this re-arms the displayed work timer
    // to the new length. The guard is harmless defense.
    if (phase === 'work') {
      timeLeft = workMinutes * 60;
      updateDisplay();
    }
    updateLengthToggleUI();
  }

  len25Btn.addEventListener('click', () => setLength(25));
  len50Btn.addEventListener('click', () => setLength(50));

  warmupCheck.addEventListener('change', () => {
    if (hasStarted || running) { warmupCheck.checked = preheat; return; } // locked mid-session
    preheat = warmupCheck.checked;
    const data = loadData();
    data.preheat = preheat;
    saveData(data);
  });

  function updateMuteUI() {
    muteBtn.textContent = muted ? '🔇' : '🔊';
  }

  muteBtn.addEventListener('click', () => {
    muted = !muted;
    const data = loadData();
    data.muted = muted;
    saveData(data);
    updateMuteUI();
  });

  soundSelect.addEventListener('change', () => {
    soundName = soundSelect.value;
    const data = loadData();
    data.sound = soundName;
    saveData(data);
    playSound(soundName); // preview, even when muted (explicit "let me hear it" action)
  });

  // ── Session switching ──
  function triggerFlash() {
    flash.classList.remove('active');
    void flash.offsetWidth; // Force reflow
    flash.classList.add('active');
  }

  function advancePhase() {
    if (phase === 'warmup') {
      // Warm-up done -> roll straight into the focus session, still running.
      phase = 'work';
      timeLeft = workMinutes * 60;
      applyPhaseMode();
      playEndSound();
      triggerFlash();
      startTitleFlash("Warmed up — let's go 🔥");
      updateLengthToggleUI();
      updateDisplay();
    } else if (phase === 'work') {
      // Work done -> record it and auto-start the 10-minute rest, still running.
      recordSession();
      // Burn one pomodoro off the active task, then surface the next task's name.
      const data = loadData();
      data.plan = completeOnePomodoro(data.plan);
      saveData(data);
      renderPlan();
      loadActiveTaskName();
      phase = 'break';
      timeLeft = REST_DURATION;
      applyPhaseMode();
      playEndAlert();
      triggerFlash();
      startTitleFlash('🍅 Break time!');
      updateLengthToggleUI();
      updateDisplay();
      // still running, so the ring shows "Tap to pause" — the user can pause the rest.
    } else {
      // Rest done -> arm the next pomodoro but wait for the user to press Start.
      stopInterval();
      phase = 'work';
      timeLeft = workMinutes * 60;
      applyPhaseMode();
      playEndAlert();
      triggerFlash();
      startTitleFlash('✅ Back to work!');
      hasStarted = false;
      updateLengthToggleUI();
      updateDisplay();
    }
  }

  // ── Timer controls ──
  function tick() {
    if (timeLeft > 0) {
      timeLeft--;
      updateDisplay();
    } else {
      advancePhase();
    }
  }

  function stopInterval() {
    running = false;
    clearInterval(interval);
    interval = null;
  }

  function start() {
    if (running) return;
    getAudioCtx(); // unlock/resume audio within this click gesture
    // On a fresh work start, surface the active task's name if the user hasn't typed one.
    if (!hasStarted && phase === 'work' && !taskInput.value.trim()) {
      loadActiveTaskName();
    }
    // Fresh/armed start with warm-up enabled -> begin with the 5-min pre-heat phase.
    if (!hasStarted && phase === 'work' && preheat) {
      phase = 'warmup';
      timeLeft = WARMUP_DURATION;
      applyPhaseMode();
    }
    running = true;
    hasStarted = true;
    interval = setInterval(tick, 1000);
    updateLengthToggleUI();
    updateDisplay();
  }

  function pause() {
    stopInterval();
    updateLengthToggleUI();
    updateDisplay();
  }

  function reset() {
    stopAlerts(); // user is clearly here — silence any repeating alert
    stopInterval();
    phase = 'work';
    hasStarted = false;
    timeLeft = workMinutes * 60;
    applyPhaseMode();
    updateLengthToggleUI();
    updateDisplay();
  }

  function toggleTimer() {
    stopAlerts(); // a tap means the user is here — silence any repeating alert
    running ? pause() : start();
  }

  // ── Event listeners ──
  // The ring is the primary start/pause control.
  timerRing.addEventListener('click', toggleTimer);
  timerRing.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleTimer(); }
  });

  resetBtn.addEventListener('click', reset);

  // ── Init ──
  const bootData = loadData();
  workMinutes = bootData.lengthPref;
  soundName = bootData.sound;
  muted = bootData.muted;
  preheat = bootData.preheat;
  soundSelect.value = soundName;
  warmupCheck.checked = preheat;
  endTimeInput.value = bootData.endTime;
  startTimeInput.value = bootData.startOverride;
  updateMuteUI();
  timeLeft = workMinutes * 60;
  updateLengthToggleUI();
  renderHistory();
  renderPlan();
  renderPills();
  if (!taskInput.value.trim()) loadActiveTaskName();
  updateDisplay();
</script>
</body>
</html>
